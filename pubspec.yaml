name: sika_stock
description: Sistema Pañol — Flutter + Supabase (Web, Android, iOS).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  excel: ^4.0.6
  file_picker: ^11.0.2
  fl_chart: ^1.1.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_local_notifications: ^20.1.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.0.0
  image: ^4.3.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  open_filex: ^4.7.0
  pdf: ^3.11.3
  pdfx: ^2.9.2
  syncfusion_flutter_pdf: ^28.2.12
  printing: ^5.14.3
  share_plus: ^10.1.4
  signature: ^5.5.0
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  supabase_flutter: ^2.12.4
  timezone: ^0.10.1
  web: ^1.1.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  shared_preferences: ^2.5.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon_launcher.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon_launcher.png"
  min_sdk_android: 23
  web:
    generate: true
    image_path: "assets/icon_launcher.png"
    background_color: "#000000"
    theme_color: "#E30613"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/sika.png
    - assets/icon_launcher.png
