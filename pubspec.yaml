name: sika_stock
description: Sistema Pañol — Flutter + Supabase (Web, Android, iOS).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  excel: ^4.0.6
  fl_chart: ^1.1.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_local_notifications: ^20.1.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.0.0
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  pdf: ^3.11.3
  printing: ^5.14.3
  qr_flutter: ^4.1.0
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  shared_preferences: ^2.5.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/sika.png
